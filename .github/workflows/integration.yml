name: Integration

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"  # weekly Mon 06:17 UTC

permissions:
  contents: read

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: docker pull anarkiwi/headlessvice:latest
      - run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - run: python -m pytest -m integration -ra tests/integration
